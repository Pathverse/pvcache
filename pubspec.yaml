name: pvcache
description: "Adding hooks to Sembast and Flutter secure storage for advanced caching strategies"
version: 0.0.1
homepage: https://github.com/Pathverse/pvcache

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.4
  path: ^1.9.0
  sembast: ^3.8.5+1
  sembast_web: ^2.4.2
  crypto: ^3.0.3
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
